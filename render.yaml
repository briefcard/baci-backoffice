# Render Blueprint — one always-on web service serves the API + the built PWA (single URL,
# reachable on mobile), plus a Postgres for reps/audit. Connect this repo in Render → Blueprints.
services:
  - type: web
    name: baci-backoffice
    runtime: node
    plan: starter # always-on (no cold starts) — needed for webhooks + live SSE
    rootDir: .
    buildCommand: npm --prefix web install && npm --prefix web run build && npm --prefix server install
    startCommand: npm --prefix server start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: APP_URL # set to this service's public URL after first deploy (e.g. https://baci-backoffice.onrender.com)
        sync: false
      - key: SHOPIFY_STORE
        value: 769684-2.myshopify.com
      - key: SHOPIFY_ADMIN_TOKEN # Admin API access token (shpat_…) — REQUIRED to sync products
        sync: false
      - key: SHOPIFY_API_KEY # Client ID
        sync: false
      - key: SHOPIFY_API_SECRET # Client Secret — also used as the webhook HMAC secret
        sync: false
      - key: SHOPIFY_WEBHOOK_SECRET # leave blank to fall back to SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_products,read_inventory,read_locations,read_draft_orders,write_draft_orders
      - key: AUTH_DISABLED
        value: "false"
      - key: REP_LOGINS # interim email+password auth, e.g. [{"email":"a@x.com","name":"A","password":"pw"}]
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: MAGIC_LINK_FROM
        value: Baci Reps <reps@bacimilanousa.com>
      - key: DATABASE_URL
        fromDatabase:
          name: baci-backoffice-db
          property: connectionString

databases:
  - name: baci-backoffice-db
    plan: basic-256mb # or 'free' to start
